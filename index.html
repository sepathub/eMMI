<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Rekod MMI SK Simpang Empat</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {

    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    
    <style>
        /* Pengubahsuaian scrollbar supaya nampak kemas */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }

            @page {
                size: landscape;
                margin: 0.5cm;
            }
            body {
                background: white;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;

            }
            .no-print, header, footer, .tabs-nav, .admin-btn {
                display: none !important;
            }

                display: block !important;
                visibility: visible !important;
                position: absolute;
                top: 0;

                page-break-after: always;
                break-inside: avoid;
                margin-bottom: 20px;
                display: block;
                width: 100%;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                font-size: 8pt;
                table-layout: fixed;
            }
            th, td {
                border: 1px solid black !important;
                padding: 2px;
                text-align: center;
                vertical-align: middle;
                overflow: hidden;
                word-wrap: break-word;
            }
            th {
                background-color: #e5e7eb !important;
                font-weight: bold;
                height: 25px;
                font-size: 9pt;
            }
            td { height: 50px; }
            th:first-child, td:first-child {
                width: 80px;
                background-color: #f3f4f6 !important;
                font-weight: bold;
            }
        }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // --- 1. IMPORT LIBRARY ---
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { motion, AnimatePresence } from 'https://esm.sh/framer-motion@10.16.4?deps=react@18.2.0,react-dom@18.2.0';
        import { 
            BookOpen, User, Clock, ClipboardList, CheckCircle, Calendar, 
            ChevronDown, Trash2, Timer, BarChart3, CalendarDays, Search, X, 
            Users, School, Lock, ShieldCheck, PlusCircle, Printer, LogOut, LogIn
        } from 'https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0,react-dom@18.2.0';
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        // --- 2. DATA TETAP (CONSTANTS) ---
        const GURU_LIST = [
            "AIDAH BINTI HASHIM @ GHAZALI",
            "AIMAN BIN SANI",
            "AISYAH BINTI JAINUDIN",
            "ANUAR BIN ISMAIL",
            "AZIAN BIN OSMAN",
            "AZLAN BIN ISHAK",
            "EMIE NURLIYANA BINTI OTHMAN",
            "FAIZAH BINTI WAHID @ MOHAMAD",
            "HAIDHAR MUNZER BIN KHALID",
            "HANIZA BINTI SEDIN",
            "KARTHIYAINY A/P GOVALIN @ GOBALAN",
            "KARTINI BINTI ABDUL MANAN",
            "MADINAH BINTI MOKHTAR",
            "MARDZIAH BINTI AHMAD",
            "MARYAM SAKINAH BINTI HANAFI",
            "MOHAMMAD SAIFULLAH BIN BAHARIN",
            "MOHD SHAHIRAN BIN ROSLI",
            "MOHD ZAKWAN BIN MOHD ZAMRI",
            "MUHAMMAD ALBAZLI BIN ROSALI",
            "MUHAMMAD DANIAL BIN JAMALUDIN",
            "MUHAMMAD WA'IE BIN MUSTAZA",
            "NOR ALFISYAH BINTI HAIRULDIN",
            "NORLIDA BINTI ABDUL RAZAH",
            "NORLY BINTI AMINUDDIN",
            "NUR AISYAH BINTI SA'AID @ ZAIDUN",
            "NUR IZZAH ABIDAH BINTI AB RHAMAN",
            "NURASHIDAH BINTI ABDUL KARIM",
            "NURASYURA BINTI A MOKTAR",
            "NURBAYA BINTI CHAHED",
            "NURHIDAYATI BINTI ABDULLAH",
            "NURHIDAYU BINTI AMRAN",
            "NURIN AMNI AFIQAH BINTI CEK AHMAD AZAM",
            "NURUL ANIS BINTI ROSLAN AMFANDY",
            "NURUL IZZAH ILLYANI BINTI ZULKEFLEE",
            "RAAJALETCHMI A/P BATHMANAZAN",
            "ROSNIZAN BINTI ABD RANI",
            "RUBIAH BINTI AWANG MAT",
            "SAKINAH BINTI MUSTAFAR",
            "SHEH ABDULCCADER JAILANEE BIN OTHMAN",
            "SITI AMIRA SAMSUDDIN",
            "SITI ANAWIYAH BINTI HARIS",
            "SUZANA BINTI SULAIMAN",
            "ZAINUL ARIFFIN BIN MOHD ZHAFFAR"
        ];

        const KELAS_LIST = [
            "PRA Cemerlang", "Pra Gemilang",
            "1 Ikhlas", "1 Setia", "2 Maju", "2 Perkasa",
            "3 Naim", "3 Aktif", "4 Gigih", "4 Ehsan",
            "5 Mahir", "5 Pintar",
            "6 Arif", "6 Tekun",
            "PPKI Adn", "PPKI Mawa", "PPKI Firdaus", "PPKI Rayyan"
        ];

        const SUBJEK_LIST = [
            "Bahasa Melayu (BM)", "Bahasa Inggeris (BI)", "Matematik (MT)", "Sains (SN)",
            "Bahasa Arab (BA)", "Pendidikan Islam (PAI)", "Pendidikan Moral", 
            "Pendidikan Jasmani & Kesihatan (PJK)", "Pendidikan Seni Visual (PSV)", 
            "Pendidikan Muzik", "Sejarah (SEJ)", "Reka Bentuk & Teknologi (RBT)", 
            "TASMIK", "Kelas Ganti", "Lain-lain"
        ];

        const MASA_LIST = Array.from({ length: 12 }, (_, i) => i + 1);

        // Fungsi Jana Minggu 2026
        const generateWeeks2026 = () => {
            const weeks = [];
            let currentDate = new Date(2026, 0, 5); 
            
            for (let i = 1; i <= 52; i++) {
                const startDate = new Date(currentDate);
                startDate.setHours(0,0,0,0);
                
                const endDate = new Date(currentDate);
                endDate.setDate(currentDate.getDate() + 4); 
                endDate.setHours(23,59,59,999);

                const format = (d) => `${d.getDate()}/${d.getMonth() + 1}`;
                
                weeks.push({
                    id: i,
                    label: `Minggu ${i}`,
                    range: `${format(startDate)} - ${format(endDate)}`,
                    startObj: startDate,
                    endObj: endDate
                });
                
                currentDate.setDate(currentDate.getDate() + 7);
            }
            return weeks;
        };

        const WEEKS_LIST = generateWeeks2026();

        // --- 3. FUNGSI UTILITI ---
        const getTodayISO = () => {
            const d = new Date();
            d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
            return d.toISOString().split('T')[0];
        };

        const formatDateStandard = (dateObj) => {
            const day = dateObj.getDate();
            const month = dateObj.getMonth() + 1;
            const year = dateObj.getFullYear();
            return `${day}/${month}/${year}`;
        };

        const isSameDate = (recordDateString, targetDateObj) => {
            if (!recordDateString) return false;
            const parts = recordDateString.split(/[\/\-]/); 
            if (parts.length !== 3) return false;
            
            const rDay = parseInt(parts[0], 10);
            const rMonth = parseInt(parts[1], 10);
            const rYear = parseInt(parts[2], 10);

            const tDay = targetDateObj.getDate();
            const tMonth = targetDateObj.getMonth() + 1;
            const tYear = targetDateObj.getFullYear();

            return rDay === tDay && rMonth === tMonth && rYear === tYear;
        };

        // --- 4. KOMPONEN UTAMA ---
        function App() {
            // Konfigurasi Supabase
            const supabaseUrl = 'https://dmordrhbqoscisyfxvie.supabase.co';
            const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtb3JkcmhicW9zY2lzeWZ4dmllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxNzE0MjcsImV4cCI6MjA4Mjc0NzQyN30.IneYIzHI3aBMF_XhLvO7WIjlZaWs9w06HBIrZdktYZE';
            const supabase = createClient(supabaseUrl, supabaseKey);

            // Cari minggu semasa
            const getCurrentWeekId = () => {
                const today = new Date();
                const foundWeek = WEEKS_LIST.find(week => 
                    today >= week.startObj && today <= new Date(week.endObj.getTime() + 2 * 86400000) 
                );
                return foundWeek ? foundWeek.id : WEEKS_LIST[0].id;
            };

            // State Aplikasi
            const [activeTab, setActiveTab] = useState('entry');
            const [records, setRecords] = useState([]);
            const [notification, setNotification] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedWeek, setSelectedWeek] = useState(getCurrentWeekId());

            // State Admin
            const [isAdmin, setIsAdmin] = useState(false);
            const [adminPass, setAdminPass] = useState('');
            const [adminDate, setAdminDate] = useState(getTodayISO());
            const [adminReportWeek, setAdminReportWeek] = useState(getCurrentWeekId()); 
            const [adminReportClass, setAdminReportClass] = useState('all'); 

            // Borang Guru
            const [formData, setFormData] = useState({
                teacherName: '',
                selectedClass: '',
                selectedSubject: '',
                selectedPeriod: ''
            });

            // Borang Admin (Manual)
            const [adminFormData, setAdminFormData] = useState({
                teacherName: '',
                selectedClass: '',
                selectedSubject: '',
                selectedPeriod: '',
                selectedTime: '' 
            });

            // Effect: Tarik data bila tab bertukar
            useEffect(() => {
                fetchRecords();
            }, [activeTab]);

            // Fungsi Tarik Data Supabase
            const fetchRecords = async () => {
                const { data, error } = await supabase
                    .from('rekod_mmi')
                    .select('*')
                    .order('id', { ascending: false });

                if (error) {
                    console.error('Ralat menarik data:', error);
                } else {
                    const formattedData = (data || []).map(item => ({
                        id: item.id,
                        teacherName: item.teachername || item.teacherName,
                        className: item.classname || item.className,
                        subject: item.subject,
                        period: item.period,
                        timestamp: item.timestamp,
                        date: item.date
                    }));
                    setRecords(formattedData);
                }
            };

            // Handlers
            const handleInputChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));
            const handleAdminInputChange = (e) => setAdminFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminPass === 'Sayacomel123') {
                    setIsAdmin(true);
                    showNotification("Berjaya log masuk admin", "success");
                } else {
                    showNotification("Kata laluan salah", "error");
                }
            };

            const handleAdminLogout = () => {
                setIsAdmin(false);
                setAdminPass('');
                setActiveTab('entry'); 
                showNotification("Berjaya log keluar", "success");
            };

            // Fungsi Padam Rekod
            const handleDelete = async (id) => {
                if (window.confirm("Adakah anda pasti mahu memadam rekod ini?")) {
                    const { error } = await supabase.from('rekod_mmi').delete().eq('id', id);
                    if (error) showNotification("Gagal memadam rekod.", "error");
                    else {
                        fetchRecords();
                        showNotification("Rekod telah dipadam.", "success");
                    }
                }
            };

            // Fungsi Hantar (Guru)
            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.teacherName || !formData.selectedClass || !formData.selectedSubject || !formData.selectedPeriod) {
                    showNotification("Sila lengkapkan semua maklumat!", "error");
                    return;
                }

                // Waktu automatik sistem
                const formattedTime = new Date().toLocaleTimeString('ms-MY', { hour: '2-digit', minute: '2-digit' });

                const newRecordPayload = {
                    teachername: formData.teacherName,
                    classname: formData.selectedClass,
                    subject: formData.selectedSubject,
                    period: formData.selectedPeriod,
                    timestamp: formattedTime, 
                    date: formatDateStandard(new Date()) 
                };
                
                const { error } = await supabase.from('rekod_mmi').insert([newRecordPayload]);
                if (error) {
                    showNotification("Gagal menyimpan.", "error");
                } else {
                    fetchRecords(); 
                    setFormData({ teacherName: '', selectedClass: '', selectedSubject: '', selectedPeriod: '' });
                    showNotification("Rekod berjaya disimpan online!", "success");
                }
            };

            // Fungsi Hantar (Admin Manual Backdate)
            const handleAdminSubmit = async (e) => {
                e.preventDefault();
                if (!adminFormData.teacherName || !adminFormData.selectedClass || !adminFormData.selectedSubject || !adminFormData.selectedPeriod || !adminFormData.selectedTime) {
                    showNotification("Sila lengkapkan semua maklumat termasuk masa!", "error");
                    return;
                }
                
                // Proses Tarikh & Masa
                const dateParts = adminDate.split('-'); // YYYY-MM-DD
                const dateObj = new Date(dateParts[0], dateParts[1]-1, dateParts[2]);
                
                // Format Masa (HH:MM -> 12am/pm)
                let [hours, minutes] = adminFormData.selectedTime.split(':');
                hours = parseInt(hours);
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12;
                hours = hours ? hours : 12; 
                const formattedTime = `${hours}:${minutes} ${ampm}`;

                const newRecordPayload = {
                    teachername: adminFormData.teacherName,
                    classname: adminFormData.selectedClass,
                    subject: adminFormData.selectedSubject,
                    period: adminFormData.selectedPeriod,
                    timestamp: formattedTime, 
                    date: formatDateStandard(dateObj)
                };
                
                const { error } = await supabase.from('rekod_mmi').insert([newRecordPayload]);
                if (error) {
                    showNotification("Gagal menyimpan.", "error");
                } else {
                    fetchRecords(); 
                    setAdminFormData({ teacherName: '', selectedClass: '', selectedSubject: '', selectedPeriod: '', selectedTime: '' });
                    showNotification(`Rekod ditambah untuk tarikh ${formatDateStandard(dateObj)}`, "success");
                }
            };

            const handlePrint = () => {
                window.print();
            };

            // Utiliti Lain
            const showNotification = (message, type) => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 3000);
            };

            // Logic Data Laporan
            const getFilteredRecords = () => {
                const today = new Date(); 
                let filtered = records.filter(record => isSameDate(record.date, today));
                if (!searchTerm) return filtered;
                return filtered.filter(record => 
                    (record.teacherName || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
                    (record.className || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
                    (record.subject || '').toLowerCase().includes(searchTerm.toLowerCase())
                );
            };

            const getClassStats = () => {
                const stats = {};
                const currentWeekData = WEEKS_LIST.find(w => w.id === selectedWeek);
                if (!currentWeekData) return [];

                records.forEach(record => {
                    if (!record.date) return;
                    const parts = record.date.split(/[\/\-]/);
                    if(parts.length !== 3) return;
                    const recordDate = new Date(parts[2], parts[1]-1, parts[0]);
                    
                    const weekStart = currentWeekData.startObj;
                    const weekEnd = new Date(currentWeekData.endObj);
                    weekEnd.setDate(weekEnd.getDate() + 2); // Cover weekend
                    weekEnd.setHours(23,59,59,999);

                    if (recordDate >= weekStart && recordDate <= weekEnd) {
                        if (!stats[record.className]) stats[record.className] = { name: record.className, totalEntries: 0 };
                        stats[record.className].totalEntries += 1;
                    }
                });
                return Object.values(stats).sort((a, b) => a.name.localeCompare(b.name));
            };

            // Logic Data Admin
            const getAdminFilteredRecords = () => {
                const parts = adminDate.split('-'); 
                if(parts.length !== 3) return [];
                const safeDateObj = new Date(parts[0], parts[1]-1, parts[2]);
                return records.filter(record => isSameDate(record.date, safeDateObj));
            };

            const getTableDataForClass = (targetClass) => {
                const weekData = WEEKS_LIST.find(w => w.id === adminReportWeek);
                if (!weekData) return null;
                const days = [];
                for (let i = 0; i < 5; i++) {
                    const d = new Date(weekData.startObj);
                    d.setDate(d.getDate() + i);
                    days.push(formatDateStandard(d)); 
                }
                return { className: targetClass, weekLabel: weekData.label, range: weekData.range, days: days };
            };

            const getTeacherForCell = (dateStr, periodStr, className) => {
                const parts = dateStr.split('/');
                const cellDateObj = new Date(parts[2], parts[1]-1, parts[0]);
                return records.find(r => isSameDate(r.date, cellDateObj) && r.className === className && r.period.toString() === periodStr.toString());
            };

            // Render Variables
            const displayedRecords = getFilteredRecords();
            const adminRecords = getAdminFilteredRecords();
            const classesToPrint = adminReportClass === 'all' ? KELAS_LIST : [adminReportClass];

            // Animasi Variants
            const tabVariants = {
                hidden: { opacity: 0, x: -10 },
                visible: { opacity: 1, x: 0, transition: { duration: 0.3 } },
                exit: { opacity: 0, x: 10, transition: { duration: 0.2 } }
            };
            const itemVariants = { hidden: { opacity: 0, y: 20 }, visible: { opacity: 1, y: 0 } };
            const containerVariants = { hidden: { opacity: 0 }, visible: { opacity: 1, transition: { staggerChildren: 0.1 } } };

            return (
                <div className="min-h-screen bg-slate-100 font-sans pb-24 selection:bg-indigo-200">
                <AnimatePresence>
                    {notification && (
                    <motion.div initial={{ opacity: 0, y: -50, x: "-50%" }} animate={{ opacity: 1, y: 0, x: "-50%" }} exit={{ opacity: 0, y: -50, x: "-50%" }} className={`fixed top-4 left-1/2 px-6 py-3 rounded-full shadow-xl z-50 text-white font-bold flex items-center gap-2 ${notification.type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`}>
                        {notification.type === 'success' ? <CheckCircle size={18} /> : <X size={18} />} {notification.message}
                    </motion.div>
                    )}
                </AnimatePresence>

                <header className="no-print bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 text-white p-8 rounded-b-[3rem] shadow-xl mb-8 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
                        <motion.div animate={{ rotate: 360 }} transition={{ duration: 50, repeat: Infinity, ease: "linear" }} className="absolute top-[-50px] left-[-50px] w-40 h-40 bg-white rounded-full mix-blend-overlay blur-3xl"/>
                        <motion.div animate={{ rotate: -360 }} transition={{ duration: 60, repeat: Infinity, ease: "linear" }} className="absolute bottom-[-50px] right-[-50px] w-60 h-60 bg-yellow-300 rounded-full mix-blend-overlay blur-3xl"/>
                    </div>
                    <button onClick={() => setActiveTab('admin')} className="admin-btn absolute top-6 right-6 text-white/70 hover:text-white hover:bg-white/10 p-2 rounded-full transition-all z-20" title="Akses Admin"><Lock size={20} /></button>
                    <motion.div initial={{ scale: 0.8, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} transition={{ duration: 0.5 }} className="relative z-10 flex flex-col items-center text-center">
                    <div className="bg-white p-2 rounded-full shadow-lg mb-4"><img src="https://i.postimg.cc/W4vLfYrm/LOGO-SKSE-utk-background-putih-(2).jpg" alt="Logo SKSE" className="w-24 h-24 object-contain rounded-full"/></div>
                    <h1 className="text-xs font-bold tracking-[0.2em] text-indigo-100 uppercase mb-2 bg-indigo-800 bg-opacity-30 px-4 py-1 rounded-full">Sistem e-Rekod MMI</h1>
                    <h2 className="text-3xl font-extrabold leading-tight text-white drop-shadow-md">SK SIMPANG EMPAT</h2>
                    <p className="text-indigo-100 text-sm mt-3 flex items-center gap-2 bg-white/10 px-4 py-1.5 rounded-full backdrop-blur-sm"><Calendar size={14} className="text-yellow-300" /> {new Date().toLocaleDateString('ms-MY', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                    </motion.div>
                </header>

                <main className="px-4 max-w-lg mx-auto">
                    <div className="tabs-nav no-print flex justify-between bg-white p-1.5 rounded-2xl shadow-lg shadow-indigo-100 mb-8 mx-2 overflow-x-auto">
                    {[
                        { id: 'entry', icon: User, label: 'Masuk', color: 'bg-indigo-500' },
                        { id: 'report', icon: ClipboardList, label: 'Harian', color: 'bg-rose-500' },
                        { id: 'weekly', icon: BarChart3, label: 'Mingguan', color: 'bg-amber-500' },
                    ].map((tab) => (
                        <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-1 py-3 px-2 rounded-xl text-xs sm:text-sm font-bold transition-all duration-300 flex items-center justify-center gap-2 relative min-w-[80px] ${activeTab === tab.id ? `text-white shadow-md transform scale-105` : 'text-slate-400 hover:bg-slate-50 hover:text-slate-600'}`}>
                            {activeTab === tab.id && <motion.div layoutId="activeTab" className={`absolute inset-0 rounded-xl ${tab.color}`} initial={false} transition={{ type: "spring", stiffness: 500, damping: 30 }}/>}
                            <span className="relative z-10 flex items-center gap-1 sm:gap-2"><tab.icon size={16} /> <span className="hidden sm:inline">{tab.label}</span></span>
                        </button>
                    ))}
                    </div>

                    <AnimatePresence mode="wait">
                    
                    {/* TAB MASUK */}
                    {activeTab === 'entry' && (
                    <motion.div key="entry" variants={tabVariants} initial="hidden" animate="visible" exit="exit" className="space-y-5">
                        <motion.div variants={itemVariants} className="bg-white p-1 rounded-2xl shadow-sm border-b-4 border-indigo-100 focus-within:border-indigo-400 transition-colors">
                        <div className="p-5">
                            <label className="text-xs font-bold text-indigo-400 uppercase tracking-wide mb-2 block">Nama Penuh</label>
                            <div className="relative flex items-center gap-3">
                                <div className="bg-indigo-50 p-2.5 rounded-xl text-indigo-500"><User size={22} /></div>
                                {/* DROPDOWN PILIHAN NAMA GURU */}
                                <select name="teacherName" value={formData.teacherName} onChange={handleInputChange} className="w-full bg-transparent font-bold text-slate-700 text-lg appearance-none focus:outline-none">
                                    <option value="">Pilih Nama Guru</option>
                                    {GURU_LIST.map((guru) => (
                                        <option key={guru} value={guru}>{guru}</option>
                                    ))}
                                </select>
                                <ChevronDown className="absolute right-0 text-slate-300 pointer-events-none" size={20} />
                            </div>
                        </div>
                        </motion.div>

                        <motion.div variants={itemVariants} className="grid grid-cols-2 gap-4">
                            {/* KELAS */}
                            <div className="bg-white p-1 rounded-2xl shadow-sm border-b-4 border-teal-100 focus-within:border-teal-400 transition-colors">
                                <div className="p-5">
                                    <label className="text-xs font-bold text-teal-400 uppercase tracking-wide mb-2 block">Kelas</label>
                                    <div className="relative flex items-center gap-3">
                                        <div className="bg-teal-50 p-2.5 rounded-xl text-teal-500"><CheckCircle size={22} /></div>
                                        <select name="selectedClass" value={formData.selectedClass} onChange={handleInputChange} className="w-full bg-transparent font-bold text-slate-700 text-lg appearance-none focus:outline-none">
                                        <option value="">Pilih Kelas</option>
                                        {KELAS_LIST.map((kelas) => (<option key={kelas} value={kelas}>{kelas}</option>))}
                                        </select>
                                        <ChevronDown className="absolute right-0 text-slate-300 pointer-events-none" size={20} />
                                    </div>
                                </div>
                            </div>
                            {/* MASA (JADUAL) */}
                            <div className="bg-white p-1 rounded-2xl shadow-sm border-b-4 border-amber-100 focus-within:border-amber-400 transition-colors">
                                <div className="p-4 flex flex-col items-center">
                                    <label className="text-[10px] font-bold text-amber-400 uppercase tracking-wide mb-1 block text-center">Masa (Jadual)</label>
                                    <div className="relative w-full">
                                        <select name="selectedPeriod" value={formData.selectedPeriod} onChange={handleInputChange} className="w-full text-center bg-transparent font-black text-slate-700 text-2xl appearance-none focus:outline-none py-1">
                                            <option value="">-</option>
                                            {MASA_LIST.map((masa) => (<option key={masa} value={masa}>{masa}</option>))}
                                        </select>
                                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none text-slate-200 opacity-20"><Timer size={40} /></div>
                                    </div>
                                </div>
                            </div>
                        </motion.div>

                        <motion.div variants={itemVariants} className="bg-white p-1 rounded-2xl shadow-sm border-b-4 border-rose-100 focus-within:border-rose-400 transition-colors">
                            <div className="p-5">
                                <label className="text-xs font-bold text-rose-400 uppercase tracking-wide mb-2 block">Subjek</label>
                                <div className="relative">
                                    <select name="selectedSubject" value={formData.selectedSubject} onChange={handleInputChange} className="w-full bg-transparent font-bold text-slate-700 text-lg appearance-none focus:outline-none truncate pr-6">
                                        <option value="">Pilih...</option>
                                        {SUBJEK_LIST.map((subjek) => (<option key={subjek} value={subjek}>{subjek}</option>))}
                                    </select>
                                    <ChevronDown className="absolute right-0 top-1/2 -translate-y-1/2 text-slate-300 pointer-events-none" size={20} />
                                </div>
                            </div>
                        </motion.div>

                        <motion.button initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: 0.4 }} whileHover={{ scale: 1.02 }} whileTap={{ scale: 0.95 }} onClick={handleSubmit} className="group w-full mt-6 py-4 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white rounded-2xl shadow-xl shadow-indigo-200 font-bold text-lg flex items-center justify-center gap-3 border-b-4 border-indigo-700 active:border-b-0 active:translate-y-1">
                        <div className="bg-white/20 p-1.5 rounded-full group-hover:rotate-12 transition-transform"><CheckCircle size={20} className="text-white" /></div>Sahkan Kehadiran</motion.button>
                    </motion.div>
                    )}

                    {/* TAB HARIAN */}
                    {activeTab === 'report' && (
                    <motion.div key="report" variants={tabVariants} initial="hidden" animate="visible" exit="exit" className="space-y-6">
                        <div className="bg-rose-50 p-4 rounded-2xl border border-rose-100 flex justify-between items-center">
                            <div><h3 className="text-lg font-bold text-rose-800">Laporan Harian</h3><p className="text-xs text-rose-500">Tarikh: {new Date().toLocaleDateString('ms-MY', { weekday: 'long', day: 'numeric', month: 'long' })}</p></div>
                            <span className="bg-white text-rose-600 shadow-sm border border-rose-100 text-xl font-black px-4 py-2 rounded-xl">{displayedRecords.length}</span>
                        </div>
                        <div className="relative">
                        <input type="text" placeholder="Cari..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full p-4 pl-12 pr-10 bg-white border border-slate-200 rounded-2xl shadow-sm focus:outline-none"/>
                        <div className="absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"><Search size={20} /></div>
                        {searchTerm && <button onClick={() => setSearchTerm('')} className="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 hover:text-rose-500"><X size={20} /></button>}
                        </div>
                        {displayedRecords.length === 0 ? (
                        <div className="text-center py-16 bg-white rounded-3xl border-2 border-dashed border-slate-200 opacity-70"><p className="text-slate-400 font-medium">Tiada rekod.</p></div>
                        ) : (
                        <motion.div variants={containerVariants} initial="hidden" animate="visible" className="space-y-4">
                            {KELAS_LIST.map(kelas => {
                                const classRecords = displayedRecords.filter(r => r.className === kelas);
                                if (classRecords.length === 0) return null;
                                return (
                                <motion.div key={kelas} variants={itemVariants} className="bg-white rounded-2xl shadow-md shadow-slate-200 overflow-hidden border border-slate-100">
                                    <div className="bg-slate-50/50 px-5 py-3 border-b border-slate-100 flex justify-between items-center"><h4 className="font-bold text-slate-700 flex items-center gap-2"><span className="w-3 h-3 bg-teal-400 rounded-full shadow-sm"></span>{kelas}</h4></div>
                                    <div className="divide-y divide-slate-50">
                                    {classRecords.map((record) => (
                                        <div key={record.id} className="p-4 flex items-center justify-between hover:bg-indigo-50/30">
                                        <div className="flex items-center gap-4">
                                            <div className="flex flex-col items-center justify-center w-12 h-12 bg-indigo-100 rounded-xl text-indigo-600"><span className="text-[9px] font-bold uppercase">Masa</span><span className="text-xl font-black">{record.period}</span></div>
                                            <div><p className="font-bold text-slate-700 text-sm">{record.teacherName}</p><span className="inline-block px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wide mt-1 bg-emerald-100 text-emerald-600">{record.subject}</span><div className="text-[10px] text-slate-400 mt-1 flex items-center gap-1"><Clock size={10} /> {record.timestamp}</div></div>
                                        </div>
                                        <button onClick={() => handleDelete(record.id)} className="text-slate-300 hover:text-red-500"><Trash2 size={16} /></button>
                                        </div>
                                    ))}
                                    </div>
                                </motion.div>
                                );
                            })}
                        </motion.div>
                        )}
                    </motion.div>
                    )}

                    {/* TAB MINGGUAN */}
                    {activeTab === 'weekly' && (
                    <motion.div key="weekly" variants={tabVariants} initial="hidden" animate="visible" exit="exit" className="space-y-6">
                        <div className="bg-amber-50 p-6 rounded-3xl border border-amber-100 text-center"><h3 className="text-xl font-bold text-amber-800">Analisis Mingguan</h3></div>
                        <div className="bg-white p-2 rounded-2xl shadow-sm border border-amber-100 flex items-center gap-2">
                            <CalendarDays className="text-amber-500 ml-2" size={20} />
                            <select value={selectedWeek} onChange={(e) => setSelectedWeek(Number(e.target.value))} className="w-full bg-transparent font-bold text-amber-900 text-sm focus:outline-none">{WEEKS_LIST.map((week) => (<option key={week.id} value={week.id}>{week.range}</option>))}</select>
                        </div>
                        <div className="bg-white rounded-2xl shadow-lg shadow-slate-200 border border-slate-100 overflow-hidden">
                            <table className="w-full text-sm text-left">
                            <thead className="bg-slate-50 text-slate-500"><tr><th className="px-5 py-4 pl-8">Kelas</th><th className="px-5 py-4 text-center">Bil. Masuk</th></tr></thead>
                            <tbody className="divide-y divide-slate-100">
                                {getClassStats().map((stat, idx) => (
                                <tr key={idx}><td className="px-5 py-4 pl-8 font-bold text-slate-700">{stat.name}</td><td className="px-5 py-4 text-center"><span className="inline-flex items-center justify-center w-10 h-10 bg-amber-400 text-white rounded-xl font-black">{stat.totalEntries}</span></td></tr>
                                ))}
                            </tbody>
                            </table>
                        </div>
                    </motion.div>
                    )}

                    {/* TAB ADMIN */}
                    {activeTab === 'admin' && (
                    <motion.div key="admin" variants={tabVariants} initial="hidden" animate="visible" exit="exit" className="space-y-6">
                        {!isAdmin ? (
                            <div className="flex flex-col items-center justify-center py-10">
                                <div className="bg-white p-8 rounded-3xl shadow-xl border text-center w-full max-w-sm">
                                    <h3 className="text-xl font-bold text-slate-800 mb-6">Akses Admin</h3>
                                    <form onSubmit={handleAdminLogin} className="space-y-4">
                                        <input type="password" value={adminPass} onChange={(e) => setAdminPass(e.target.value)} placeholder="Kata laluan" className="w-full p-4 bg-slate-50 border rounded-xl text-center font-bold"/>
                                        <button type="submit" className="w-full py-3 bg-slate-800 text-white rounded-xl font-bold">Log Masuk</button>
                                        <button type="button" onClick={() => setActiveTab('entry')} className="w-full py-2 text-slate-400 text-xs">Batal</button>
                                    </form>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-8">
                                <div className="no-print bg-slate-800 p-6 rounded-3xl text-white shadow-lg flex justify-between items-center">
                                    <div><h3 className="text-xl font-bold">Panel Admin</h3></div>
                                    <button onClick={handleAdminLogout} className="bg-red-500/20 text-red-100 p-2 px-3 rounded-xl flex items-center gap-2 text-xs font-bold"><LogOut size={16} /> Keluar</button>
                                </div>

                                {/* CETAKAN */}
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <h4 className="no-print text-sm font-bold text-slate-700 mb-4 flex items-center gap-2"><Printer size={18} /> Cetakan Jadual Kelas</h4>
                                    <div className="no-print flex flex-col gap-3 mb-4">
                                        <div className="grid grid-cols-2 gap-3">
                                            <select value={adminReportWeek} onChange={(e) => setAdminReportWeek(Number(e.target.value))} className="p-2 border rounded-lg text-sm">{WEEKS_LIST.map((week) => (<option key={week.id} value={week.id}>{week.range}</option>))}</select>
                                            <select value={adminReportClass} onChange={(e) => setAdminReportClass(e.target.value)} className="p-2 border rounded-lg text-sm"><option value="all">Semua Kelas</option>{KELAS_LIST.map((k) => (<option key={k} value={k}>{k}</option>))}</select>
                                        </div>
                                        <button onClick={handlePrint} className="bg-indigo-600 text-white px-4 py-3 rounded-xl font-bold text-sm w-full">Cetak Jadual</button>
                                    </div>
                                    {/* JADUAL HIDDEN UNTUK PRINT */}
                                    <div id="printable-report" className="hidden">
                                        {classesToPrint.map((className) => {
                                            const tableData = getTableDataForClass(className);
                                            if (!tableData) return null;
                                            return (
                                                <div key={className} className="print-page-break">
                                                    <div className="text-center mb-4"><h1 className="text-lg font-bold uppercase">SK Simpang Empat - Laporan e-Rekod MMI</h1><h2 className="text-base font-bold">Jadual Kehadiran: {className}</h2><p className="text-xs">Minggu: {tableData.range}</p></div>
                                                    <table className="w-full border-collapse border border-slate-400 text-xs">
                                                        <thead><tr className="bg-slate-100"><th className="border p-1 w-24">Hari / Waktu</th>{MASA_LIST.map(m => <th key={m} className="border p-1">{m}</th>)}</tr></thead>
                                                        <tbody>
                                                            {tableData.days.map((dayStr, dIdx) => {
                                                                const dayName = ['Ahad', 'Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat', 'Sabtu'][new Date(dayStr.split('/').reverse().join('-')).getDay()];
                                                                return (
                                                                    <tr key={dIdx}>
                                                                        <td className="border p-1 font-bold">{dayName}<div className="text-[9px] font-normal">{dayStr}</div></td>
                                                                        {MASA_LIST.map(m => {
                                                                            const cellRecord = getTeacherForCell(dayStr, m, className);
                                                                            return <td key={m} className="border p-1 h-12">{cellRecord ? <div className="flex flex-col items-center justify-center h-full"><span className="font-bold text-[9px]">{cellRecord.teacherName}</span><span className="text-[8px] italic">{cellRecord.subject}</span></div> : ''}</td>
                                                                        })}
                                                                    </tr>
                                                                )
                                                            })}
                                                        </tbody>
                                                    </table>
                                                    <div className="mt-2 text-[9px] text-right text-slate-500">Dicetak pada: {new Date().toLocaleString('ms-MY')}</div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>

                                {/* TAMBAH MANUAL */}
                                <div className="no-print bg-white p-6 rounded-2xl shadow-sm border-t-4 border-indigo-500">
                                    <h4 className="text-sm font-bold text-indigo-600 mb-4"><PlusCircle size={18} /> Tambah Rekod Manual</h4>
                                    <div className="space-y-4">
                                        <input type="date" value={adminDate} onChange={(e) => setAdminDate(e.target.value)} className="w-full p-3 border rounded-xl"/>
                                        {/* DROPDOWN ADMIN NAMA GURU */}
                                        <select name="teacherName" value={adminFormData.teacherName} onChange={handleAdminInputChange} className="w-full p-3 border rounded-xl">
                                            <option value="">Pilih Nama Guru</option>
                                            {GURU_LIST.map((guru) => (
                                                <option key={guru} value={guru}>{guru}</option>
                                            ))}
                                        </select>
                                        <div className="grid grid-cols-2 gap-3">
                                            <select name="selectedClass" value={adminFormData.selectedClass} onChange={handleAdminInputChange} className="w-full p-3 border rounded-xl"><option value="">Pilih Kelas</option>{KELAS_LIST.map(k => <option key={k} value={k}>{k}</option>)}</select>
                                            <select name="selectedSubject" value={adminFormData.selectedSubject} onChange={handleAdminInputChange} className="w-full p-3 border rounded-xl"><option value="">Pilih Subjek</option>{SUBJEK_LIST.map(s => <option key={s} value={s}>{s}</option>)}</select>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <select name="selectedPeriod" value={adminFormData.selectedPeriod} onChange={handleAdminInputChange} className="w-full p-3 border rounded-xl"><option value="">Pilih Waktu</option>{MASA_LIST.map(m => <option key={m} value={m}>{m}</option>)}</select>
                                            <input type="time" name="selectedTime" value={adminFormData.selectedTime} onChange={handleAdminInputChange} className="w-full p-3 border rounded-xl text-center"/>
                                        </div>
                                        <button onClick={handleAdminSubmit} className="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold">Simpan</button>
                                    </div>
                                </div>

                                {/* SENARAI REKOD ADMIN */}
                                <div className="no-print">
                                    <h4 className="text-sm font-bold text-slate-700 mb-3">Senarai Rekod ({new Date(adminDate).toLocaleDateString('ms-MY')})</h4>
                                    {adminRecords.length === 0 ? <div className="text-center py-10 bg-white rounded-2xl border-2 border-dashed text-slate-400 text-sm">Tiada rekod.</div> : 
                                    <div className="bg-white rounded-2xl shadow-sm border divide-y">
                                        {adminRecords.map((record) => (
                                            <div key={record.id} className="p-4 flex items-center justify-between">
                                                <div><p className="font-bold text-sm">{record.teacherName}</p><p className="text-xs text-slate-500">{record.className} • {record.subject}</p></div>
                                                <button onClick={() => handleDelete(record.id)} className="text-red-500"><Trash2 size={16} /></button>
                                            </div>
                                        ))}
                                    </div>}
                                </div>
                            </div>
                        )}
                    </motion.div>
                    )}
                    </AnimatePresence>
                </main>
                
                <footer className="no-print text-center p-8 text-indigo-300 text-[10px] font-medium tracking-wide">
                    <p>© 2026 SKSE</p>
                    <p className="opacity-50 mt-1">SePaT ❤️</p>
                </footer>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
